services:
  db:
    image: pgvector/pgvector:0.8.4-pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: shopping_mall_crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d shopping_mall_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
